<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Eventi — Calendario Eventi | TattiOnline</title>
<meta name="description" content="Scopri eventi locali. Naviga il calendario, filtra per categoria, trova cose da fare.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{background:#FAF7F2;color:#2D2A26;font-family:'Nunito',sans-serif}
#root{min-height:100vh;display:flex;flex-direction:column}
.fi{animation:fi .35s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#D4CFC7;border-radius:3px}
img{max-width:100%;display:block}
@media(max-width:768px){
  html{font-size:13px}
  .cal-layout{flex-direction:column !important}
  .cal-grid-wrap{min-width:0 !important}
  .side-panel{flex:1 !important;max-height:none !important;min-width:0 !important;border:none !important;border-top:1px solid #E8E4DD !important;border-radius:0 !important;box-shadow:none !important;padding:16px 0 !important}
  .filter-chips{gap:4px !important}
  .chip-btn{padding:4px 8px !important;font-size:11px !important}
  .hdr-top{flex-direction:column !important;align-items:flex-start !important}
  .hdr-act{width:100%;justify-content:space-between !important}
  .month-label{font-size:20px !important}
  .card-img{height:120px !important}
  .cal-cell{width:calc((100vw - 42px) / 7) !important;min-height:calc((100vw - 42px) / 7) !important;padding:3px !important}
  .cell-num{font-size:11px !important;font-weight:700 !important}
  .day-hdr{font-size:9px !important;padding:6px 0 !important;letter-spacing:0 !important}
  .cell-evt{display:none !important}
  .cell-dots-mobile{display:flex !important;gap:2px !important;flex-wrap:wrap !important}
  .today-bdg{display:none !important}
  .main-area{padding:0 8px 16px !important}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const{useState,useMemo,useEffect,useCallback}=React;

const API_URL='/api/events';

/* ═══════════ i18n ═══════════ */
const T={
  it:{
    title:"Eventi",tagline:"Calendario Eventi della Comunità",
    calendar:"Calendario",list:"Lista",today:"Oggi",
    search:"Cerca eventi, luoghi…",all:"Tutti",free:"Gratis",paid:"A pagamento",
    upcoming:"In programma a",noEventsDay:"Nessun evento in questo giorno",noEventsMonth:"Nessun evento questo mese",noMatch:"Nessun evento corrisponde ai filtri",
    back:"← Indietro",date:"Data",time:"Ora",venue:"Luogo",address:"Indirizzo",organizer:"Organizzatore",price:"Prezzo",language:"Lingua",phone:"Telefono",freeLabel:"Gratuito!",sponsored:"Sponsorizzato",
    events:"eventi",loading:"Caricamento eventi…",sampleData:"Dati di esempio",
    months:["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"],
    monthsS:["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"],
    days:["Lun","Mar","Mer","Gio","Ven","Sab","Dom"],
  },
  en:{
    title:"Eventi",tagline:"Community Event Calendar",
    calendar:"Calendar",list:"List",today:"Today",
    search:"Search events, venues…",all:"All",free:"Free",paid:"Paid",
    upcoming:"Upcoming in",noEventsDay:"No events on this day",noEventsMonth:"No events this month",noMatch:"No events match your filters",
    back:"← Back",date:"Date",time:"Time",venue:"Venue",address:"Address",organizer:"Organizer",price:"Price",language:"Language",phone:"Phone",freeLabel:"Free!",sponsored:"Sponsored",
    events:"events",loading:"Loading events…",sampleData:"Sample data",
    months:["January","February","March","April","May","June","July","August","September","October","November","December"],
    monthsS:["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],
    days:["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
  }
};

/* ═══════════ CATEGORIES ═══════════ */
const CAT_STYLE={
  Music:{bg:"#FDE8F0",fg:"#C2185B",icon:"🎵"},
  Food:{bg:"#FFF3E0",fg:"#E65100",icon:"🍽"},
  Art:{bg:"#E8EAF6",fg:"#283593",icon:"🎨"},
  Sport:{bg:"#E8F5E9",fg:"#2E7D32",icon:"⚽"},
  Community:{bg:"#F3E5F5",fg:"#6A1B9A",icon:"🤝"},
  Workshop:{bg:"#E0F7FA",fg:"#00695C",icon:"🔧"},
  Market:{bg:"#FFF8E1",fg:"#F57F17",icon:"🛍"},
  Wellness:{bg:"#E8F5E9",fg:"#1B5E20",icon:"🧘"},
  Culture:{bg:"#EDE7F6",fg:"#4527A0",icon:"📚"},
  Theatre:{bg:"#FCE4EC",fg:"#880E4F",icon:"🎭"},
  Cinema:{bg:"#EFEBE9",fg:"#4E342E",icon:"🎬"},
  Festival:{bg:"#FFF3E0",fg:"#BF360C",icon:"🎪"},
  Ambiente:{bg:"#E8F5E9",fg:"#33691E",icon:"🌿"},
  Environment:{bg:"#E8F5E9",fg:"#33691E",icon:"🌿"},
  "Presentazione libro":{bg:"#E8EAF6",fg:"#1A237E",icon:"📖"},
};
const DEF_CAT={bg:"#F5F5F5",fg:"#616161",icon:"📌"};
function gc(c){return CAT_STYLE[c]||DEF_CAT}

/* ═══════════ HELPERS ═══════════ */
function isFree(p){return !p||/free|gratis|gratuito|^0$|^€0$/i.test(p)}
function dim(y,m){return new Date(y,m+1,0).getDate()}
function fdow(y,m){const d=new Date(y,m,1).getDay();return d===0?6:d-1}
function fmt(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function ds(s){return(s||'').slice(0,10)}

/* ═══════════ APP ═══════════ */
function App(){
  const now=new Date();
  const[lang,setLang]=useState(()=>(/^en/i.test(navigator.language)?'en':'it'));
  const t=T[lang];
  const[events,setEvents]=useState([]);
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState(null);
  const[month,setMonth]=useState(now.getMonth());
  const[year,setYear]=useState(now.getFullYear());
  const[selDate,setSelDate]=useState(null);
  const[selEvent,setSelEvent]=useState(null);
  const[catF,setCatF]=useState("All");
  const[priceF,setPriceF]=useState("All");
  const[search,setSearch]=useState("");
  const[view,setView]=useState("cal");

  const fetchEvents=useCallback(async()=>{
    setLoading(true);setError(null);
    try{
      const r=await fetch(API_URL);
      if(!r.ok)throw new Error(`Error ${r.status}`);
      const d=await r.json();
      if(d.error)throw new Error(d.error);
      setEvents(d.events||[]);
    }catch(e){
      setError(e.message);
      setEvents([
        {id:"s1",event_name:"Jazz al Tramonto",date_start:"2026-05-18",time_start:"21:00",location_name:"Blue Note Milano",category:"Music",price:"€25",description:"Live jazz quartet.",is_sponsored:false},
        {id:"s2",event_name:"Street Food Festival",date_start:"2026-05-20",date_end:"2026-05-22",time_start:"11:00",location_name:"Darsena",category:"Food",price:"Free",description:"International street food.",is_sponsored:true},
        {id:"s3",event_name:"Yoga al Parco",date_start:"2026-05-24",time_start:"08:00",location_name:"Parco Sempione",category:"Sport",price:"Free",is_sponsored:false},
      ]);
    }
    setLoading(false);
  },[]);

  useEffect(()=>{fetchEvents()},[fetchEvents]);

  const categories=useMemo(()=>{
    const c=new Set(events.map(e=>e.category).filter(Boolean));
    return["All",...Array.from(c).sort()];
  },[events]);

  const filtered=useMemo(()=>{
    return events.filter(e=>{
      if(catF!=="All"&&e.category!==catF)return false;
      if(priceF==="Free"&&!isFree(e.price))return false;
      if(priceF==="Paid"&&isFree(e.price))return false;
      if(search){const s=search.toLowerCase();if(!e.event_name.toLowerCase().includes(s)&&!(e.location_name||'').toLowerCase().includes(s)&&!(e.organizer||'').toLowerCase().includes(s))return false}
      return true;
    });
  },[events,catF,priceF,search]);

  const monthEvts=useMemo(()=>{
    return filtered.filter(e=>{
      const s=new Date(ds(e.date_start)+'T12:00:00');
      const end=e.date_end?new Date(ds(e.date_end)+'T12:00:00'):s;
      return s<=new Date(year,month+1,0,23,59)&&end>=new Date(year,month,1);
    }).sort((a,b)=>a.date_start.localeCompare(b.date_start));
  },[filtered,year,month]);

  function onDate(d){return filtered.filter(e=>{const s=ds(e.date_start),end=ds(e.date_end)||s;return s<=d&&d<=end})}

  const nDays=dim(year,month),fd=fdow(year,month);
  const cells=[];
  for(let i=0;i<fd;i++)cells.push(null);
  for(let d=1;d<=nDays;d++)cells.push(d);
  while(cells.length%7)cells.push(null);

  const todayStr=fmt(now.getFullYear(),now.getMonth(),now.getDate());

  function prev(){if(month===0){setMonth(11);setYear(y=>y-1)}else setMonth(m=>m-1);setSelDate(null);setSelEvent(null)}
  function next(){if(month===11){setMonth(0);setYear(y=>y+1)}else setMonth(m=>m+1);setSelDate(null);setSelEvent(null)}

  const dateFmt=lang==='it'?'it-IT':'en-GB';

  return(
  <div style={S.root}>
    {/* HEADER */}
    <header style={S.hdr}>
      <div className="hdr-top" style={S.hdrTop}>
        <div>
          <h1 style={S.logo}>📅 <span style={S.logoTxt}>{t.title}</span></h1>
          <p style={S.tag}>{t.tagline}</p>
        </div>
        <div className="hdr-act" style={S.hdrAct}>
          <button style={{...S.vBtn,...(view==="cal"?S.vBtnA:{})}} onClick={()=>setView("cal")}>📅 {t.calendar}</button>
          <button style={{...S.vBtn,...(view==="list"?S.vBtnA:{})}} onClick={()=>setView("list")}>📋 {t.list}</button>
          <button style={S.tBtn} onClick={()=>{setMonth(now.getMonth());setYear(now.getFullYear());setSelDate(todayStr);setSelEvent(null)}}>{t.today}</button>
          <button style={S.langBtn} onClick={()=>setLang(l=>l==='it'?'en':'it')} title="Switch language">
            {lang==='it'?'🇬🇧 EN':'🇮🇹 IT'}
          </button>
        </div>
      </div>
      <div style={S.fRow}>
        <div style={S.sWrap}><span style={S.sIco}>🔍</span><input style={S.sIn} placeholder={t.search} value={search} onChange={e=>setSearch(e.target.value)}/></div>
        <div className="filter-chips" style={S.chips}>
          {categories.map(c=>{const cs=gc(c);const a=catF===c;return <button key={c} className="chip-btn" onClick={()=>setCatF(c)} style={{...S.chip,...(a?{background:c==="All"?"#2D2A26":cs.fg,color:"#fff",borderColor:"transparent"}:{})}}>{c!=="All"&&cs.icon?cs.icon+" ":""}{c==="All"?t.all:c}</button>})}
          <span style={S.cdiv}>·</span>
          <button className="chip-btn" onClick={()=>setPriceF("All")} style={{...S.chip,...(priceF==="All"?{background:"#2D2A26",color:"#fff",borderColor:"transparent"}:{})}}>{t.all}</button>
          <button className="chip-btn" onClick={()=>setPriceF("Free")} style={{...S.chip,...(priceF==="Free"?{background:"#2D2A26",color:"#fff",borderColor:"transparent"}:{})}}>{lang==='it'?'🆓 Gratis':'🆓 Free'}</button>
          <button className="chip-btn" onClick={()=>setPriceF("Paid")} style={{...S.chip,...(priceF==="Paid"?{background:"#2D2A26",color:"#fff",borderColor:"transparent"}:{})}}>{lang==='it'?'💶 A pagamento':'💶 Paid'}</button>
        </div>
      </div>
    </header>

    {loading&&<div style={S.stat}>⏳ {t.loading}</div>}
    {error&&<div style={{...S.stat,background:"#FFF3E0",color:"#E65100"}}>⚠️ {t.sampleData}</div>}

    {/* CALENDAR */}
    {view==="cal"&&<div className="main-area" style={S.mainA}>
      <div style={S.mNav}><button style={S.arr} onClick={prev}>‹</button><h2 className="month-label" style={S.mLbl}>{t.months[month]} <span style={S.yLbl}>{year}</span></h2><button style={S.arr} onClick={next}>›</button></div>
      <div className="cal-layout" style={S.calL}>
        <div className="cal-grid-wrap" style={S.calGW}>
          <div style={S.calG}>
            {t.days.map(d=><div key={d} className="day-hdr" style={S.dH}>{d}</div>)}
            {cells.map((day,i)=>{
              if(!day)return <div key={'e'+i} style={S.eC}/>;
              const d=fmt(year,month,day),de=onDate(d),isT=d===todayStr,isS=d===selDate,isW=((fd+day-1)%7)>=5;
              return(
                <div key={day} className="cal-cell" style={{...S.cl,...(isW?S.clW:{}),...(isT?S.clT:{}),...(isS?S.clS:{})}} onClick={()=>{setSelDate(d);setSelEvent(null)}}>
                  <div style={S.clH}><span className="cell-num" style={{...S.clN,...(isT?S.clNT:{})}}>{day}</span>{isT&&<span className="today-bdg" style={S.tBdg}>{t.today.toLowerCase()}</span>}</div>
                  <div style={S.clEv}>
                    {de.slice(0,3).map((ev,j)=>{const cs=gc(ev.category);return(
                      <div key={ev.id+'_'+j} className="cell-evt" style={{...S.cEv,background:cs.bg,color:cs.fg,borderLeft:'3px solid '+cs.fg}} onClick={e=>{e.stopPropagation();setSelDate(d);setSelEvent(ev)}} title={ev.event_name}>
                        {ev.event_name}
                      </div>
                    )})}
                    {de.length>3&&<div style={S.cMore}>+{de.length-3}</div>}
                  </div>
                  {/* Mobile dots fallback */}
                  <div className="cell-dots-mobile" style={S.dotsM}>
                    {de.slice(0,4).map((ev,j)=><span key={j} style={{...S.dotM,background:gc(ev.category).fg}}/>)}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
        <div className="side-panel" style={S.sP}>
          {selEvent?<Detail ev={selEvent} onBack={()=>setSelEvent(null)} t={t} dateFmt={dateFmt}/>
          :selDate?<div className="fi"><h3 style={S.sT}>{new Date(selDate+'T12:00:00').toLocaleDateString(dateFmt,{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</h3>{onDate(selDate).length===0?<div style={S.emSt}><span style={{fontSize:40}}>📭</span><p>{t.noEventsDay}</p></div>:onDate(selDate).map(ev=><Card key={ev.id} ev={ev} onClick={()=>setSelEvent(ev)} t={t}/>)}</div>
          :<div className="fi"><h3 style={S.sT}>📋 {t.upcoming} {t.months[month]}</h3>{monthEvts.length===0?<div style={S.emSt}><span style={{fontSize:40}}>🗓</span><p>{t.noEventsMonth}</p></div>:monthEvts.map(ev=><Card key={ev.id} ev={ev} onClick={()=>{setSelEvent(ev);setSelDate(ds(ev.date_start))}} t={t}/>)}</div>}
        </div>
      </div>
    </div>}

    {/* LIST */}
    {view==="list"&&<div style={S.listA}>
      <div style={S.mNav}><button style={S.arr} onClick={prev}>‹</button><h2 className="month-label" style={S.mLbl}>{t.months[month]} <span style={S.yLbl}>{year}</span></h2><button style={S.arr} onClick={next}>›</button></div>
      {monthEvts.length===0?<div style={S.emSt}><span style={{fontSize:48}}>🗓</span><p style={{fontSize:16}}>{t.noMatch}</p></div>
      :monthEvts.map(ev=><Card key={ev.id} ev={ev} wide onClick={()=>setSelEvent(ev)} t={t}/>)}
      {selEvent&&<div style={S.ovl} onClick={()=>setSelEvent(null)}><div style={S.mdl} onClick={e=>e.stopPropagation()}><Detail ev={selEvent} onBack={()=>setSelEvent(null)} t={t} dateFmt={dateFmt}/></div></div>}
    </div>}

    <footer style={S.ft}><span>tattionline.com</span><span>{events.length} {t.events}</span></footer>
  </div>);
}

/* ═══════════ CARD ═══════════ */
function Card({ev,onClick,wide,t}){
  const cs=gc(ev.category);const d=new Date(ds(ev.date_start)+'T12:00:00');
  const hasEnd=ev.date_end&&ds(ev.date_end)!==ds(ev.date_start);
  const MS=T[Object.keys(T).find(k=>T[k]===t)]?.monthsS||T.en.monthsS;
  return(
    <div style={{...S.card,...(wide?{maxWidth:'100%'}:{})}} onClick={onClick} className="fi">
      {ev.flyer_thumb&&<div className="card-img" style={{...S.cardImg,backgroundImage:`url(${ev.flyer_thumb})`}}/>}
      {!ev.flyer_thumb&&<div style={{...S.cardAc,background:cs.fg}}/>}
      <div style={S.cardC}>
        <div style={S.cardTop}>
          <div style={{...S.catBdg,background:cs.bg,color:cs.fg}}>{cs.icon} {ev.category}</div>
          {ev.is_sponsored&&<span style={S.spBdg}>⭐ {t.sponsored}</span>}
          {isFree(ev.price)&&<span style={S.frBdg}>{t.free||'Free'}</span>}
        </div>
        <h4 style={S.cardNm}>{ev.event_name}</h4>
        <div style={S.cardDt}>
          <span style={S.cdl}>📅 {d.getDate()} {MS[d.getMonth()]}{hasEnd?' → '+ds(ev.date_end):''}</span>
          {ev.time_start&&ev.time_start!=='00:00'&&<span style={S.cdl}>🕐 {ev.time_start}</span>}
          {ev.location_name&&<span style={S.cdl}>📍 {ev.location_name}</span>}
        </div>
        {!isFree(ev.price)&&ev.price&&<div style={S.cardPr}>💶 {ev.price}</div>}
      </div>
    </div>
  );
}

/* ═══════════ DETAIL ═══════════ */
function Detail({ev,onBack,t,dateFmt}){
  const cs=gc(ev.category);const d=new Date(ds(ev.date_start)+'T12:00:00');
  return(
    <div className="fi" style={{animation:'slideIn .3s ease'}}>
      <button style={S.bk} onClick={onBack}>{t.back}</button>
      {/* Flyer image */}
      {ev.flyer_image&&<div style={S.flyerWrap}><img src={ev.flyer_image} alt={ev.event_name} style={S.flyerImg}/></div>}
      {/* Hero */}
      <div style={{...S.dHero,background:`linear-gradient(135deg,${cs.bg},#fff)`}}>
        {!ev.flyer_image&&<span style={{fontSize:48}}>{cs.icon}</span>}
        <div style={{...S.dCatB,background:cs.fg,color:'#fff'}}>{ev.category}</div>
        <h2 style={S.dTtl}>{ev.event_name}</h2>
        {ev.is_sponsored&&<span style={S.spBdg}>⭐ {t.sponsored}</span>}
      </div>
      {/* Info */}
      <div style={S.dInfo}>
        <IR i="📅" l={t.date} v={d.toLocaleDateString(dateFmt,{weekday:'long',day:'numeric',month:'long',year:'numeric'})+(ev.date_end&&ds(ev.date_end)!==ds(ev.date_start)?' → '+ds(ev.date_end):'')}/>
        {ev.time_start&&ev.time_start!=='00:00'&&<IR i="🕐" l={t.time} v={ev.time_start}/>}
        {ev.location_name&&<IR i="📍" l={t.venue} v={ev.location_name}/>}
        {ev.address&&<IR i="🗺️" l={t.address} v={ev.address}/>}
        {ev.organizer&&<IR i="👤" l={t.organizer} v={ev.organizer}/>}
        <IR i="💶" l={t.price} v={isFree(ev.price)?t.freeLabel:ev.price}/>
        {ev.language&&<IR i="🌐" l={t.language} v={ev.language}/>}
        {ev.phone&&<IR i="📞" l={t.phone} v={ev.phone}/>}
      </div>
      {ev.description&&<div style={S.dDesc}><p style={S.dDTxt}>{ev.description}</p></div>}
    </div>
  );
}
function IR({i,l,v}){return <div style={S.ir}><span style={S.irI}>{i}</span><span style={S.irL}>{l}</span><span style={S.irV}>{v}</span></div>}

/* ═══════════ STYLES ═══════════ */
const S={
  root:{fontFamily:"'Nunito',sans-serif",background:"#FAF7F2",color:"#2D2A26",minHeight:"100vh",display:"flex",flexDirection:"column"},
  hdr:{background:"#fff",borderBottom:"1px solid #E8E4DD",padding:"14px 20px 10px",position:"sticky",top:0,zIndex:100,boxShadow:"0 1px 8px rgba(0,0,0,.04)"},
  hdrTop:{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10,marginBottom:10},
  logo:{fontSize:26,margin:0,display:"flex",alignItems:"center",gap:8},
  logoTxt:{fontFamily:"'Playfair Display',serif",fontWeight:700,color:"#2D2A26"},
  tag:{fontSize:11,color:"#8C8578",letterSpacing:1.5,textTransform:"uppercase",marginTop:2},
  hdrAct:{display:"flex",gap:5,flexWrap:"wrap"},
  vBtn:{background:"#F5F1EC",border:"1px solid #E8E4DD",color:"#6B6560",padding:"7px 14px",borderRadius:20,cursor:"pointer",fontSize:12,fontFamily:"'Nunito',sans-serif",fontWeight:600,transition:"all .15s"},
  vBtnA:{background:"#2D2A26",color:"#fff",borderColor:"#2D2A26"},
  tBtn:{background:"#E8F5E9",border:"1px solid #A5D6A7",color:"#2E7D32",padding:"7px 14px",borderRadius:20,cursor:"pointer",fontSize:12,fontFamily:"'Nunito',sans-serif",fontWeight:700},
  langBtn:{background:"#F5F1EC",border:"1px solid #E8E4DD",color:"#6B6560",padding:"7px 12px",borderRadius:20,cursor:"pointer",fontSize:12,fontFamily:"'Nunito',sans-serif",fontWeight:700,transition:"all .15s"},
  fRow:{},
