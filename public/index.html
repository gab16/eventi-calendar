<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Maremma Live</title>
<meta name="description" content="Il tuo calendario eventi locale. Scatta, carica, scopri."/>
<link rel="icon" href="/assets/logo.png"/>
<link rel="apple-touch-icon" href="/assets/logo.png"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#1a3d2b"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="MaremmaLive"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>if(window.pdfjsLib)window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --g:#1a3d2b;--gm:#2d7d5a;--gl:#3d9970;
  --cream:#f5f0e8;--cd:#e8e1d4;
  --td:#1a1a1a;--tm:#4a5568;--tl:#718096;
  --w:#ffffff;--blue:#2563eb;--blue-h:#1d4ed8;
  --r:8px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--td);font-size:15px;line-height:1.4;position:relative}

/* TOP BAR */
.topbar{background:var(--g);color:#fff;padding:0 12px;height:52px;display:flex;align-items:center;gap:10px;position:relative;z-index:50;flex-shrink:0}
.topbar-logo{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.topbar-logo img{height:34px;width:34px;object-fit:contain;border-radius:6px}
.topbar-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-add{width:40px;height:40px;background:var(--blue);border:none;border-radius:50%;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(37,99,235,0.4);transition:background 0.15s}
.btn-add:active{background:var(--blue-h)}
.lang-toggle{padding:4px 8px;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.3);color:#fff;border-radius:var(--r);font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:0.5px;flex-shrink:0}
.lang-toggle:active{background:rgba(255,255,255,0.25)}
.btn-hamburger{width:38px;height:38px;background:transparent;border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;border-radius:var(--r)}
.btn-hamburger:active{background:rgba(255,255,255,0.1)}

/* FILTER BAR */
.filterbar{background:var(--w);border-bottom:1px solid var(--cd);padding:8px 12px;display:none;gap:8px;align-items:center;flex-shrink:0}
.filterbar.open{display:flex}
.filter-search{flex:1;padding:8px 12px;border:1.5px solid var(--cd);border-radius:var(--r);font-size:13.5px;font-family:'DM Sans',sans-serif;outline:none;background:var(--cream)}
.filter-search:focus{border-color:var(--gm)}
.cat-chips{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:2px 0}
.cat-chips::-webkit-scrollbar{display:none}
.cat-chip{padding:5px 12px;border-radius:20px;font-size:11.5px;font-weight:600;border:1.5px solid var(--cd);background:var(--w);cursor:pointer;white-space:nowrap;transition:all 0.15s;color:var(--tm)}
.cat-chip.active{background:var(--g);color:#fff;border-color:var(--g)}

/* SCREENS */
.screen{display:none;flex-direction:column;flex:1;overflow:hidden}
.screen.active{display:flex}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* CALENDAR SCREEN */
.cal-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px;background:var(--cream)}
.cal-nav{display:flex;align-items:center;gap:10px}
.cal-arrow{width:32px;height:32px;border:1.5px solid var(--cd);border-radius:var(--r);background:var(--w);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--tm)}
.cal-arrow:active{background:var(--g);color:#fff;border-color:var(--g)}
.cal-month{font-family:'Playfair Display',serif;font-size:17px;font-weight:700}
.cal-today-btn{padding:5px 12px;border:1.5px solid var(--cd);border-radius:var(--r);background:var(--w);font-size:12px;font-weight:600;cursor:pointer;color:var(--tm)}
.cal-today-btn:active{background:var(--g);color:#fff;border-color:var(--g)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--cd);margin:0 12px 12px;border-radius:var(--r);overflow:hidden}
.cal-dh{background:var(--cream);text-align:center;padding:6px 0;font-size:10.5px;font-weight:600;color:var(--tl);text-transform:uppercase}
.cal-c{background:var(--w);min-height:48px;padding:4px;cursor:pointer;transition:background 0.1s;position:relative}
.cal-c:active{background:#eef}
.cal-c.om .cd{color:#ccc}
.cal-c.today{background:#eaf5ee}
.cal-c.today .cd{background:var(--gm);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-weight:700}
.cal-c.selected{background:#e0edff}
.cd{font-size:12px;font-weight:500;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.cal-dots{display:flex;gap:2px;margin-top:2px;flex-wrap:wrap;justify-content:center}
.cal-dot{width:6px;height:6px;border-radius:50%}
.dot-festival{background:#d97706}.dot-music{background:#7c3aed}
.dot-market{background:#0284c7}.dot-food{background:#16a34a}
.dot-wellness{background:#e11d48}.dot-culture{background:#6b7c00}
.dot-sport{background:#2563eb}.dot-business{background:#b45309}.dot-nature{background:#15803d}.dot-family{background:#c026d3}.dot-other{background:#999}

/* DAY VIEW */
.day-hdr{padding:14px 16px 10px;background:var(--cream)}
.day-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--td)}
.day-sub{font-size:12.5px;color:var(--tl);margin-top:2px}
.day-list{padding:0 12px 16px}
.day-card{background:var(--w);border:1px solid var(--cd);border-radius:var(--r);padding:12px;margin-bottom:10px;cursor:pointer;display:flex;gap:12px;align-items:center;transition:transform 0.1s}
.day-card:active{transform:scale(0.98)}
.day-card-thumb{width:56px;height:56px;border-radius:6px;background:var(--cd);overflow:hidden;flex-shrink:0}
.day-card-thumb img{width:100%;height:100%;object-fit:cover}
.day-card-ph{width:100%;height:100%;background:linear-gradient(135deg,#c8dfc8,#d4e8c4);display:flex;align-items:center;justify-content:center;font-size:20px}
.day-card-info{flex:1;min-width:0}
.day-card-name{font-size:14px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.day-card-meta{font-size:12px;color:var(--tl);display:flex;gap:8px;flex-wrap:wrap}
.pill-sm{display:inline-block;padding:1px 7px;border-radius:12px;font-size:10px;font-weight:600;text-transform:uppercase}
.ps-festival{background:#fde8cc;color:#954e00}.ps-music{background:#e8d5f5;color:#5c1a9e}
.ps-market{background:#cce8f5;color:#02628a}.ps-food{background:#d5f5e3;color:#126b33}
.ps-wellness{background:#fce8e8;color:#b01030}.ps-culture{background:#e8e8d5;color:#5a6600}
.ps-sport{background:#e8eeff;color:#1840c4}.ps-business{background:#fef3c7;color:#92400e}.ps-nature{background:#dcfce7;color:#166534}.ps-family{background:#fce7f3;color:#9d174d}.ps-other{background:#e8e8e8;color:#555}
.empty-day{text-align:center;padding:48px 24px;color:var(--tl)}
.search-results{padding:0 12px 16px}
.featured-home{padding:8px 12px 20px}
.featured-label{font-size:12px;font-weight:600;color:var(--tl);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
.featured-flyer{width:100%;border-radius:var(--r);overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.1)}
.featured-flyer img{width:100%;display:block}
.featured-flyer-ph{width:100%;height:140px;background:linear-gradient(135deg,#c8dfc8,#d4e8c4);display:flex;align-items:center;justify-content:center;font-size:36px}
.featured-info{padding:10px 12px;background:var(--w);border:1px solid var(--cd);border-top:none;border-radius:0 0 var(--r) var(--r)}
.featured-name{font-size:14px;font-weight:600;color:var(--td);margin-bottom:3px}
.featured-meta{font-size:12px;color:var(--tl)}
.sr-header{padding:12px 16px 8px;font-size:13px;color:var(--tl)}
.search-wrap{position:relative;flex:1}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:22px;height:22px;border:none;background:var(--cd);border-radius:50%;font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center;color:var(--tm)}
.search-clear.show{display:flex}
.empty-day-icon{font-size:40px;margin-bottom:12px}
.empty-day-text{font-size:14px}

/* EVENT DETAIL */
.ev-flyer{width:100%;max-height:55vh;object-fit:contain;background:var(--cd)}
.ev-flyer-ph{width:100%;height:200px;background:linear-gradient(135deg,#c8dfc8,#d4e8c4);display:flex;align-items:center;justify-content:center;font-size:48px}
.ev-body{padding:16px}
.ev-pill-row{margin-bottom:8px}
.ev-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;line-height:1.2;margin-bottom:14px}
.ev-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;font-size:13.5px;color:var(--tm);line-height:1.4}
.ev-row svg{flex-shrink:0;margin-top:2px}
.ev-desc{font-size:13px;color:var(--tm);line-height:1.6;margin-top:14px;padding-top:14px;border-top:1px solid var(--cd)}
.ev-sep{height:1px;background:var(--cd);margin:20px 0}
.ev-next-label{font-size:12px;font-weight:600;color:var(--tl);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px}

/* ADD SCREEN */
.add-area{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;flex:1}
.add-choices{display:flex;gap:16px}
.add-choice{display:flex;flex-direction:column;align-items:center;gap:10px;padding:24px 28px;background:var(--w);border:2px solid var(--cd);border-radius:16px;cursor:pointer;transition:all 0.2s}
.add-choice:active{border-color:var(--blue);background:#f0f5ff}
.add-choice.disabled{opacity:0.35;cursor:not-allowed}
.add-choice-icon{font-size:36px}
.add-choice-label{font-size:13px;font-weight:600;color:var(--td)}
.add-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin-bottom:24px;text-align:center}

/* UPLOAD PROGRESS */
.upload-box{width:100%;max-width:340px;text-align:center}
.upload-preview{width:100%;max-height:200px;object-fit:contain;border-radius:var(--r);margin-bottom:16px;background:var(--cd)}
.upload-status{font-size:14px;color:var(--tm);margin-bottom:8px}
.upload-phase{font-size:12.5px;color:var(--tl);margin-bottom:16px}
.progress-bar{width:100%;height:6px;background:var(--cd);border-radius:3px;overflow:hidden;margin-bottom:20px}
.progress-fill{height:100%;background:var(--blue);border-radius:3px;transition:width 0.4s}
.upload-done{display:flex;flex-direction:column;align-items:center;gap:12px}
.upload-done-icon{font-size:48px}
.upload-done-text{font-size:16px;font-weight:600;color:var(--g)}
.btn-back{padding:10px 24px;background:var(--g);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer}

/* BACK BUTTON (in-screen) */
.screen-back{display:flex;align-items:center;gap:6px;padding:10px 16px;background:var(--cream);font-size:13.5px;font-weight:500;color:var(--gm);cursor:pointer;border:none;width:100%;text-align:left;font-family:'DM Sans',sans-serif}
.screen-back:active{background:var(--cd)}
.screen-back svg{flex-shrink:0}

.loading{display:flex;align-items:center;justify-content:center;padding:32px;color:var(--tl);gap:8px;font-size:13px}
.spin{width:16px;height:16px;border:2px solid var(--cd);border-top-color:var(--gm);border-radius:50%;animation:sp 0.8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.pin-overlay{position:fixed;inset:0;background:var(--g);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.pin-overlay.hidden{display:none}
.pin-logo{width:72px;height:72px;object-fit:contain;border-radius:12px;margin-bottom:8px}
.pin-title{font-family:'Playfair Display',serif;font-size:22px;color:#fff;font-weight:700}
.pin-sub{font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:8px}
.pin-input{width:200px;padding:12px 16px;border-radius:var(--r);border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);color:#fff;font-size:16px;text-align:center;font-family:'DM Sans',sans-serif;letter-spacing:2px;outline:none}
.pin-input:focus{border-color:rgba(255,255,255,0.5)}
.pin-input::placeholder{color:rgba(255,255,255,0.3);letter-spacing:0}
.pin-err{font-size:12px;color:#f87171;height:18px}
.pin-btn{padding:10px 32px;background:#fff;color:var(--g);border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}

/* APP SHELL */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
</style>
</head>
<body>
<div class="pin-overlay" id="pin-overlay">
  <img class="pin-logo" src="/assets/logo.png" alt="Maremma Live"/>
  <div class="pin-title">Maremma Live</div>
  <div class="pin-sub">Demo access</div>
  <input class="pin-input" id="pin-input" type="password" placeholder="PIN" maxlength="20" onkeydown="if(event.key==='Enter')checkPin()"/>
  <div class="pin-err" id="pin-err"></div>
  <button class="pin-btn" onclick="checkPin()">Entra</button>
</div>
<div id="app" style="display:none">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-logo" onclick="goHome()">
      <img src="/assets/logo.png" alt="ML"/>
      <span class="topbar-title">Maremma Live</span>
    </div>
    <button class="btn-add" onclick="goAdd()" title="Aggiungi evento">+</button>
    <button class="lang-toggle" id="lang-toggle" onclick="toggleLang()">IT</button>
    <button class="btn-hamburger" onclick="toggleFilter()" id="hamburger-btn">&#9776;</button>
  </div>

  <!-- FILTER BAR (toggled) -->
  <div class="filterbar" id="filterbar">
    <div class="search-wrap"><input class="filter-search" id="search-input" type="text" placeholder="Cerca eventi..." oninput="applyFilters()"/><button class="search-clear" id="search-clear" onclick="clearSearch()">&#10005;</button></div>
  </div>
  <div class="cat-chips" id="cat-chips-bar" style="display:none;padding:6px 12px;background:var(--w);border-bottom:1px solid var(--cd)"></div>
  <div class="cat-chips" id="region-chips-bar" style="padding:6px 12px;background:var(--w);border-bottom:1px solid var(--cd)">
    <div class="cat-chip region-chip active" data-region="" onclick="setRegion(null)">Tutti</div>
    <div class="cat-chip region-chip" data-region="Maremma" onclick="setRegion('Maremma')">Maremma</div>
    <div class="cat-chip region-chip" data-region="Zurich" onclick="setRegion('Zurich')">Zurich</div>
    <div class="cat-chip region-chip" data-region="New York" onclick="setRegion('New York')">New York</div>
  </div>

  <!-- SCREEN: CALENDAR -->
  <div class="screen active" id="screen-cal">
    <div class="cal-hdr">
      <div class="cal-nav">
        <button class="cal-arrow" id="cal-prev-btn" onclick="chgMonth(-1)">&#8249;</button>
        <span class="cal-month" id="cal-label"></span>
        <button class="cal-arrow" id="cal-next-btn" onclick="chgMonth(1)">&#8250;</button>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="cal-today-btn" id="today-btn" onclick="goToday()">Oggi</button>
        <button class="cal-today-btn" id="view-toggle-btn" onclick="toggleListView()" title="Cambia vista">&#9776;</button>
      </div>
    </div>
    <div class="scroll-area">
      <div id="search-results" style="display:none"></div>
      <div id="cal-area">
        <div class="cal-grid" id="cal-grid"></div>
        <div class="featured-home" id="featured-home"></div>
      </div>
      <div id="list-area" style="display:none;padding:12px"></div>
    </div>
  </div>

  <!-- SCREEN: DAY -->
  <div class="screen" id="screen-day">
    <button class="screen-back" onclick="goHome()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      Calendario
    </button>
    <div class="day-hdr">
      <div class="day-title" id="day-title"></div>
      <div class="day-sub" id="day-sub"></div>
    </div>
    <div class="scroll-area">
      <div class="day-list" id="day-list"></div>
    </div>
  </div>

  <!-- SCREEN: EVENT -->
  <div class="screen" id="screen-event">
    <button class="screen-back" id="event-back-btn" onclick="goBackFromEvent()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <span id="event-back-label">Indietro</span>
    </button>
    <div class="scroll-area" id="event-content"></div>
  </div>

  <!-- SCREEN: ADD -->
  <div class="screen" id="screen-add">
    <button class="screen-back" onclick="goHome()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      Calendario
    </button>
    <div class="scroll-area">
      <div class="add-area" id="add-area">
        <div class="add-title">Aggiungi un evento</div>
        <div class="add-choices">
          <div class="add-choice disabled">
            <div class="add-choice-icon">&#128247;</div>
            <div class="add-choice-label">Fotocamera</div>
          </div>
          <label class="add-choice" id="add-library">
            <div class="add-choice-icon">&#128444;</div>
            <div class="add-choice-label">Libreria</div>
            <input type="file" accept="image/*,application/pdf" style="display:none" id="file-input" onchange="handleFile(this)"/>
          </label>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
var API="/api/events";
var FLOWISE="https://flowise.tattionline.com/api/v1/prediction/f3d22287-f6bf-47df-8403-7c7098b8e067";
var UPLOAD_API="/api/upload";
var ADMIN_PW="Tatti1234!";
var MONTHS=["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
var DAYS=["Lun","Mar","Mer","Gio","Ven","Sab","Dom"];
var allEvents=[],filtered=[],curDate=new Date(),selDay=null,selDayStr="",curScreen="cal";
var CATS=["Festival","Musica","Mercato","Food & Wine","Wellness","Cultura","Sport"];
var activeCat=null;
var REGIONS=["Maremma","Zurich","New York"];
var activeRegion=null;

function catKey(c){
  if(!c)return"other";c=c.toLowerCase();
  if(c.indexOf("festival")>=0)return"festival";
  if(c.indexOf("music")>=0||c.indexOf("concert")>=0||c.indexOf("musica")>=0)return"music";
  if(c.indexOf("market")>=0||c.indexOf("merca")>=0||c.indexOf("fiera")>=0)return"market";
  if(c.indexOf("food")>=0||c.indexOf("cibo")>=0||c.indexOf("wine")>=0||c.indexOf("vino")>=0||c.indexOf("gastr")>=0)return"food";
  if(c.indexOf("well")>=0||c.indexOf("benes")>=0)return"wellness";
  if(c.indexOf("cult")>=0||c.indexOf("arte")>=0||c.indexOf("teatro")>=0||c.indexOf("art")>=0)return"culture";
  if(c.indexOf("sport")>=0)return"sport";
  if(c.indexOf("business")>=0||c.indexOf("affari")>=0||c.indexOf("lavoro")>=0||c.indexOf("conferenz")>=0||c.indexOf("convegno")>=0)return"business";
  if(c.indexOf("natur")>=0||c.indexOf("escurs")>=0||c.indexOf("hike")>=0||c.indexOf("outdoor")>=0)return"nature";
  if(c.indexOf("bambin")>=0||c.indexOf("famig")>=0||c.indexOf("child")>=0||c.indexOf("family")>=0||c.indexOf("kids")>=0)return"family";
  return"other";
}
var CAT_LABELS={
  it:{festival:"Festival",music:"Musica",market:"Mercato",food:"Food & Vino",wellness:"Benessere",culture:"Cultura",sport:"Sport",business:"Business",nature:"Natura",family:"Famiglia",other:"Altro"},
  en:{festival:"Festival",music:"Music",market:"Market",food:"Food & Wine",wellness:"Wellness",culture:"Culture",sport:"Sport",business:"Business",nature:"Nature",family:"Family",other:"Other"}
};
function curLang(){var btn=document.getElementById("lang-toggle");return btn&&btn.textContent==="EN"?"en":"it";}
function catLabel(c){
  var lang=curLang();
  var m=CAT_LABELS[lang]||CAT_LABELS.it;
  return m[catKey(c)]||c||m.other;
}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function fmtDate(s,e){
  if(!s)return"\u2014";
  function d2s(ds){var d=new Date(ds);return d.getDate()+"/"+(d.getMonth()+1)+"/"+d.getFullYear()}
  if(!e||e===s)return d2s(s);
  return d2s(s)+" \u2192 "+d2s(e);
}

  document.getElementById("screen-"+id).classList.add("active");

  if(!noPush)history.pushState({screen:id},"","#"+id);
}

});

    CATS.map(function(c){return"<div class='cat-chip"+(activeCat===c?" active":"")+"' onclick='setCat(\""+c+"\")'>"+c+"</div>"}).join("");

function refilter(){
  var q=(document.getElementById("search-input").value||"").toLowerCase().trim();
  filtered=allEvents.filter(function(ev){
    if(activeCat&&catLabel(ev.category)!==activeCat)return false;
    if(activeRegion&&(ev.region||"")!==activeRegion)return false;
    if(q&&(ev.event_name||"").toLowerCase().indexOf(q)<0&&(ev.location_name||"").toLowerCase().indexOf(q)<0&&(ev.category||"").toLowerCase().indexOf(q)<0)return false;
    return true;
  });
}
function applyFilters(){
  var q=(document.getElementById("search-input").value||"").toLowerCase().trim();
  var xb=document.getElementById("search-clear");
  if(xb)xb.classList.toggle("show",q.length>0);
  refilter();
  if(q||activeCat){
    showSearchResults();
  }else{
    document.getElementById("search-results").style.display="none";
    document.getElementById("cal-area").style.display="";
    if(curScreen==="day")renderDay();
    else renderCal();
  }
}

function tapSearchResult(idx){
  var ev=window._searchResults[idx];
  if(!ev)return;
  selDay=new Date(ev.date_start);
  selDayStr=ev.date_start;
  var evs=filtered.filter(function(e){
    if(!e.date_start)return false;
    var s=e.date_start,end=e.date_end||s;
    return selDayStr>=s&&selDayStr<=end;
  });
  var targetIdx=evs.findIndex(function(e){return e.id===ev.id});
  if(targetIdx<0)targetIdx=0;
  document.getElementById("event-back-label").textContent=selDay.toLocaleDateString("it-IT",{day:"numeric",month:"long"});
  var ordered=[evs[targetIdx]].concat(evs.filter(function(_,i){return i!==targetIdx}));
  var h="";
  ordered.forEach(function(ev2,i){
    var cat2=catKey(ev2.category);
    var img2=ev2.flyer_image||ev2.flyer_thumb||"";
    var price2=ev2.price?(String(ev2.price)==="0"?"Gratuito":ev2.price):"Gratuito";
    if(i>0)h+="<div class='ev-sep'></div><div style='padding:0 16px'><div class='ev-next-label'>Anche oggi</div></div>";
    h+=(img2?"<img class='ev-flyer' src='"+esc(img2)+"' alt='"+esc(ev2.event_name||"")+"'/>":"<div class='ev-flyer-ph'>&#127807;</div>");
    h+="<div class='ev-body'><div class='ev-pill-row'><span class='pill-sm ps-"+cat2+"'>"+catLabel(ev2.category)+"</span></div>";
    h+="<div class='ev-name'>"+esc(ev2.event_name||"Evento")+"</div>";
    h+="<div class='ev-row'>"+SVG_CAL+"<span>"+fmtDate(ev2.date_start,ev2.date_end)+"</span></div>";
    h+="<div class='ev-row'>"+SVG_PIN+"<span>"+esc(ev2.location_name||ev2.address||"\u2014")+"</span></div>";

// CALENDAR
function chgMonth(d){curDate=new Date(curDate.getFullYear(),curDate.getMonth()+d,1);renderCal()}
function goToday(){curDate=new Date();renderCal()}
function renderCal(){
  var y=curDate.getFullYear(),m=curDate.getMonth();
  document.getElementById("cal-label").textContent=MONTHS[m]+" "+y;
  var today=new Date(),fd=new Date(y,m,1).getDay();
  var sd=fd===0?6:fd-1,dim=new Date(y,m+1,0).getDate(),dip=new Date(y,m,0).getDate();
  var byDay={};
  filtered.forEach(function(ev){
    if(!ev.date_start)return;
    var start=new Date(ev.date_start),end=ev.date_end?new Date(ev.date_end):new Date(start);
    for(var c=new Date(start);c<=end;c.setDate(c.getDate()+1)){
      if(c.getFullYear()===y&&c.getMonth()===m){
        var k=c.getDate();if(!byDay[k])byDay[k]=[];
        if(!byDay[k].find(function(e){return e.id===ev.id}))byDay[k].push(ev);
      }
    }
  });
  var h=DAYS.map(function(d){return"<div class='cal-dh'>"+d+"</div>"}).join("");
  for(var i=sd-1;i>=0;i--)h+="<div class='cal-c om'><div class='cd'>"+(dip-i)+"</div></div>";
  for(var d=1;d<=dim;d++){
    var isT=d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
    var isSel=selDay&&selDay.getDate()===d&&selDay.getMonth()===m&&selDay.getFullYear()===y;
    var evs=byDay[d]||[];
    var dots=evs.slice(0,4).map(function(ev){return"<div class='cal-dot dot-"+catKey(ev.category)+"'></div>"}).join("");
    h+="<div class='cal-c"+(isT?" today":"")+(isSel?" selected":"")+"' onclick='tapDay("+y+","+m+","+d+")'><div class='cd'>"+d+"</div>"+(dots?"<div class='cal-dots'>"+dots+"</div>":"")+"</div>";
  }
  var tot=sd+dim,rem=Math.ceil(tot/7)*7-tot;
  for(var i=1;i<=rem;i++)h+="<div class='cal-c om'><div class='cd'>"+i+"</div></div>";
  document.getElementById("cal-grid").innerHTML=h;
}

function imgToJpeg(img,MAX,Q){
  MAX=MAX||1600;Q=Q||0.82;
  var w=img.naturalWidth||img.width,h=img.naturalHeight||img.height;
  if(w>MAX){h=h*(MAX/w);w=MAX}
  if(h>MAX){w=w*(MAX/h);h=MAX}
  var c=document.createElement("canvas");c.width=w;c.height=h;
  c.getContext("2d").drawImage(img,0,0,w,h);
  return c.toDataURL("image/jpeg",Q);
}

async function pdfToJpeg(file){
  var buf=await file.arrayBuffer();
  var pdf=await window.pdfjsLib.getDocument({data:buf}).promise;
  var pg=await pdf.getPage(1);
  var v1=pg.getViewport({scale:1});
  var sc=Math.min(1600/v1.width,1600/v1.height,3);
  var v=pg.getViewport({scale:sc});
  var c=document.createElement("canvas");c.width=v.width;c.height=v.height;
  await pg.render({canvasContext:c.getContext("2d"),viewport:v}).promise;
  return c.toDataURL("image/jpeg",0.85);
}

async function findPendingRecord(){
  try{
    var r=await fetch("/api/admin",{headers:{"X-Admin-Password":ADMIN_PW}});
    if(!r.ok)return null;
    var data=await r.json();
    var evts=data.events||[];
    var pending=evts.filter(function(e){return e.status==="pending"});
    console.log("Found "+pending.length+" pending records");
    if(!pending.length)return null;
    // Return the one with the most recent id (Airtable IDs are roughly chronological)
    pending.sort(function(a,b){return b.id.localeCompare(a.id)});
    console.log("Most recent pending:",pending[0].id,pending[0].event_name);
    return pending[0].id;
  }catch(e){console.warn("findPendingRecord error:",e);return null}
}

async function handleFile(input){
  var file=input.files&&input.files[0];
  if(!file)return;
  var area=document.getElementById("add-area");
  area.innerHTML="<div class='upload-box'><div class='loading'><div class='spin'></div></div><div class='upload-status'>Preparazione immagine...</div></div>";

  try{
    var dataUrl;
    if(file.type==="application/pdf"){
      dataUrl=await pdfToJpeg(file);
    }else{
      dataUrl=await new Promise(function(res,rej){
        var img=new Image();
        img.onload=function(){res(imgToJpeg(img))};
        img.onerror=function(){rej(new Error("Immagine non valida"))};
        img.src=URL.createObjectURL(file);
      });
    }

    area.innerHTML="<div class='upload-box'><img class='upload-preview' src='"+dataUrl+"'/><div class='upload-status'>Analisi AI in corso...</div><div class='upload-phase'>Estrazione dati dal volantino</div><div class='progress-bar'><div class='progress-fill' id='prog' style='width:20%'></div></div></div>";

    // Send to Flowise
    var payload=JSON.stringify({question:"Extract event details from this flyer and save to Airtable.",uploads:[{data:dataUrl,type:"file",name:"flyer.jpg",mime:"image/jpeg"}]});
    console.log("Flowise payload size:",Math.round(payload.length/1024)+"KB");
    area.querySelector(".upload-phase").textContent="Analisi AI ("+Math.round(payload.length/1024)+"KB)...";
    area.querySelector(".upload-status").textContent="Potrebbe richiedere 20-30 secondi...";

    var recordId=null;
    var text="";
    var flowiseOk=false;

    // Send to Flowise - tolerate timeout
    try{
      var resp=await fetch(FLOWISE,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:payload
      });
      var respText=await resp.text();
      if(resp.ok){
        flowiseOk=true;
        try{var result=JSON.parse(respText);text=result.text||result.output||respText}catch(e){text=respText}
      }
    }catch(netErr){
      console.warn("Flowise fetch error (may still have created record):",netErr.message);
    }

    document.getElementById("prog").style.width="50%";
    area.querySelector(".upload-phase").textContent="Ricerca record creato...";

    // Try extract record ID from Flowise response
    if(text){
      try{
        var parsed=JSON.parse(text);
        if(Array.isArray(parsed)&&parsed[0]&&parsed[0].id)recordId=parsed[0].id;
        else if(parsed.id)recordId=parsed.id;
      }catch(e){
        var m=text.match(/rec[A-Za-z0-9]{14}/);
        if(m)recordId=m[0];
      }
    }

    // If no record ID from response, poll Airtable for most recent pending record
    if(!recordId){
      area.querySelector(".upload-phase").textContent="Ricerca record su Airtable...";
      // Wait for Flowise to finish writing to Airtable
      await new Promise(function(r){setTimeout(r,5000)});
      recordId=await findPendingRecord();
    }
    if(!recordId){
      // Second attempt after longer wait
      area.querySelector(".upload-phase").textContent="Attendo elaborazione...";
      await new Promise(function(r){setTimeout(r,8000)});
      recordId=await findPendingRecord();
    }

    document.getElementById("prog").style.width="70%";

    if(recordId){
      // Auto-approve: PATCH status to approved
      area.querySelector(".upload-phase").textContent="Approvazione automatica...";
      try{
        await fetch("/api/admin",{
          method:"PATCH",
          headers:{"Content-Type":"application/json","X-Admin-Password":ADMIN_PW},
          body:JSON.stringify({id:recordId,fields:{status:"approved"}})
        });
      }catch(e){console.warn("Auto-approve failed:",e)}

      document.getElementById("prog").style.width="85%";

      // Attach image
      area.querySelector(".upload-phase").textContent="Caricamento immagine...";
      try{
        var b64only=dataUrl.split(",")[1];
        await fetch(UPLOAD_API,{
          method:"POST",
          headers:{"Content-Type":"application/json","X-Admin-Password":ADMIN_PW},
          body:JSON.stringify({recordId:recordId,base64:b64only,filename:"flyer.jpg",contentType:"image/jpeg"})
        });
      }catch(e){console.warn("Image attach failed:",e)}
    }

    document.getElementById("prog").style.width="100%";
    setTimeout(function(){
      var evName="";
      try{var p=JSON.parse(text);if(Array.isArray(p)&&p[0])evName=p[0].event_name||"";else if(p.event_name)evName=p.event_name}catch(e){}
      area.innerHTML="<div class='upload-done'><div class='upload-done-icon'>&#9989;</div><div class='upload-done-text'>Evento aggiunto!</div>"
        +(evName?"<div style='font-size:14px;color:var(--tm);margin-top:4px;text-align:center;font-weight:600'>"+esc(evName)+"</div>":"")
        +(recordId?"":"<div style='font-size:12px;color:#d97706;margin-top:8px;text-align:center'>L\'elaborazione potrebbe ancora essere in corso.<br>Controlla tra qualche secondo.</div>")
        +"<button class='btn-back' onclick='goHome();loadEvents()' style='margin-top:16px'>Torna al calendario</button></div>";
    },600);

  }catch(e){
    var errMsg=typeof e==="object"?e.message||String(e):String(e);
    var errDetail=typeof e==="object"?e.detail||e.stack||"":"";
    console.error("Upload error:",errMsg,errDetail);
    area.innerHTML="<div class='upload-box'><div style='font-size:36px;margin-bottom:12px'>&#9888;</div><div class='upload-status' style='color:#c00'>"+esc(errMsg)+"</div><div style='font-size:11px;color:var(--tl);margin-top:8px;word-break:break-all;max-height:120px;overflow:auto;text-align:left;background:var(--cream);padding:8px;border-radius:6px'>"+esc(errDetail)+"</div><button class='btn-back' onclick='resetAdd()' style='margin-top:16px'>Riprova</button></div>";
  }
}

  var calArea=document.getElementById("cal-area");
  var listArea=document.getElementById("list-area");
  var prevBtn=document.getElementById("cal-prev-btn");
  var nextBtn=document.getElementById("cal-next-btn");
  var todayBtn=document.getElementById("today-btn");
  if(listViewActive){
    btn.textContent="📅";
    calArea.style.display="none";
    listArea.style.display="block";
    prevBtn.style.visibility="hidden";
    nextBtn.style.visibility="hidden";
    todayBtn.style.visibility="hidden";
    document.getElementById("cal-label").textContent="Prossimi eventi";
    renderList();
  } else {
    btn.textContent="☰";
    calArea.style.display="";
    listArea.style.display="none";
    prevBtn.style.visibility="";
    nextBtn.style.visibility="";
    todayBtn.style.visibility="";
    renderCal();
  }
}
function renderList(){
  var el=document.getElementById("list-area");
  var today=new Date();
  today.setHours(0,0,0,0);
  var todayStr=today.getFullYear()+"-"+String(today.getMonth()+1).padStart(2,"0")+"-"+String(today.getDate()).padStart(2,"0");
  var pairs=[];
  var seen={};
  filtered.filter(function(ev){
    if(!ev.date_start)return false;
    var end=(ev.date_end||ev.date_start).substring(0,10);
    return end>=todayStr;
  }).forEach(function(ev){
    var start=new Date(ev.date_start+"T12:00:00");
    var endStr=(ev.date_end||ev.date_start).substring(0,10);
    var end=new Date(endStr+"T12:00:00");
    for(var d=new Date(start);d<=end;d.setDate(d.getDate()+1)){
      var ds=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
      if(ds<todayStr)continue;
      var key=ds+"__"+ev.id;
      if(!seen[key]){seen[key]=true;pairs.push({dateStr:ds,ev:ev});}
    }
  });
  pairs.sort(function(a,b){
    if(a.dateStr!==b.dateStr)return a.dateStr<b.dateStr?-1:1;
    return (a.ev.time_start||"")>(b.ev.time_start||"")?1:-1;
  });
  if(!pairs.length){
    el.innerHTML="<div class='empty-day'><div class='empty-day-icon'>&#128197;</div><div class='empty-day-text'>Nessun evento in programma</div></div>";
    return;
  }
  var lastDate="";
  var h="";
  pairs.forEach(function(p){
    if(p.dateStr!==lastDate){
      var d=new Date(p.dateStr+"T12:00:00");
      var opts={weekday:"long",day:"numeric",month:"long"};
      var label=d.toLocaleDateString("it-IT",opts);
      h+="<div style='font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#8C8578;padding:14px 4px 6px'>"+label+"</div>";
      lastDate=p.dateStr;
    }
    var ev=p.ev;
    var cat=catKey(ev.category);
    var img=ev.flyer_image||ev.flyer_thumb||"";
    h+="<div class='day-card' onclick='tapEventFromList(\""+ev.id+"\")'>"
      +"<div class='day-card-thumb'>"+(img?"<img src='"+esc(img)+"' loading='lazy'/>":"<div class='day-card-ph'>&#127807;</div>")+"</div>"
      +"<div class='day-card-info'>"
      +"<div class='day-card-name'>"+esc(ev.event_name||"Evento")+"</div>"
      +"<div class='day-card-meta'><span class='pill-sm ps-"+cat+"'>"+catLabel(ev.category)+"</span>"
      +(ev.time_start?"<span>"+esc(ev.time_start)+"</span>":"")
      +"<span>"+esc(ev.location_name||"")+"</span></div>"
      +"</div></div>";
  });
  el.innerHTML=h;
}
function tapEventFromList(id){
  var ev=filtered.find(function(e){return e.id===id});
  if(!ev)return;
  selDay=new Date(ev.date_start);
  selDayStr=ev.date_start;
  document.getElementById("event-back-label").textContent=selDay.toLocaleDateString("it-IT",{day:"numeric",month:"long"});
  var cat=catKey(ev.category);
  var img=ev.flyer_image||ev.flyer_thumb||"";
  var price=ev.price?(String(ev.price)==="0"?"Gratuito":ev.price):"Gratuito";
  var h=(img?"<img class='ev-flyer' src='"+esc(img)+"' alt='"+esc(ev.event_name||"")+"'/>":"<div class='ev-flyer-ph'>&#127807;</div>");
  h+="<div class='ev-body'>";
  h+="<div class='ev-pill-row'><span class='pill-sm ps-"+cat+"'>"+catLabel(ev.category)+"</span></div>";
  h+="<div class='ev-name'>"+esc(ev.event_name||"Evento")+"</div>";
  h+="<div class='ev-row'>"+SVG_CAL+"<span>"+fmtDate(ev.date_start,ev.date_end)+"</span></div>";
  h+="<div class='ev-row'>"+SVG_PIN+"<span>"+esc(ev.location_name||ev.address||"—")+"</span></div>";
  if(ev.time_start)h+="<div class='ev-row'>"+SVG_CLK+"<span>"+esc(ev.time_start)+"</span></div>";
  h+="<div class='ev-row'>"+SVG_TKT+"<span>"+esc(price)+"</span></div>";
  if(ev.description)h+="<div class='ev-desc'>"+esc(ev.description)+"</div>";
  h+="</div>";
  document.getElementById("event-content").innerHTML=h;
  showScreen("event");
}
function toggleLang(){
  var btn=document.getElementById("lang-toggle");
  if(btn.textContent==="IT"){btn.textContent="EN";btn.style.background="rgba(255,255,255,0.3)"}
  else{btn.textContent="IT";btn.style.background="rgba(255,255,255,0.15)"}
  if(listViewActive)renderList();else renderCal();
}

async function loadEvents(){
  try{
    var r=await fetch(API);if(!r.ok)throw new Error("HTTP "+r.status);
    var data=await r.json();
    allEvents=data.events||data||[];
  }catch(e){console.error(e);allEvents=[]}
  filtered=allEvents;renderCal();renderFeaturedHome();
}

function renderFeaturedHome(){
  var el=document.getElementById("featured-home");
  if(!el)return;
  var withFlyer=allEvents.filter(function(e){return e.flyer_image||e.flyer_thumb});
  if(!withFlyer.length){el.innerHTML="";return}
  var ev=withFlyer[Math.floor(Math.random()*withFlyer.length)];
  var img=ev.flyer_image||ev.flyer_thumb;
  var cat=catKey(ev.category);
  var ds=ev.date_start?new Date(ev.date_start).toLocaleDateString("it-IT",{day:"numeric",month:"short"}):"";
  el.innerHTML="<div class='featured-label'>In evidenza</div>"
    +"<div class='featured-flyer' onclick='showFeaturedEvent(\""+ev.id+"\")'>"
    +(img?"<img src='"+esc(img)+"' alt='"+esc(ev.event_name||"")+"' loading='lazy'/>":"<div class='featured-flyer-ph'>&#127807;</div>")
    +"<div class='featured-info'>"
    +"<div class='featured-name'>"+esc(ev.event_name||"Evento")+"</div>"
    +"<div class='featured-meta'><span class='pill-sm ps-"+cat+"'>"+catLabel(ev.category)+"</span> "+ds+" &middot; "+esc(ev.location_name||"")+"</div>"
    +"</div></div>";
}

function showFeaturedEvent(id){
  var ev=allEvents.find(function(e){return e.id===id});
  if(!ev)return;
  selDay=ev.date_start?new Date(ev.date_start):new Date();
  selDayStr=ev.date_start||"";
  document.getElementById("event-back-label").textContent="Calendario";
  var cat=catKey(ev.category);
  var img=ev.flyer_image||ev.flyer_thumb||"";
  var price=ev.price?(String(ev.price)==="0"?"Gratuito":ev.price):"Gratuito";
  var h=img?"<img class='ev-flyer' src='"+esc(img)+"' alt='"+esc(ev.event_name||"")+"'/>":"<div class='ev-flyer-ph'>&#127807;</div>";
  h+="<div class='ev-body'><div class='ev-pill-row'><span class='pill-sm ps-"+cat+"'>"+catLabel(ev.category)+"</span></div>";
  h+="<div class='ev-name'>"+esc(ev.event_name||"Evento")+"</div>";
  h+="<div class='ev-row'>"+SVG_CAL+"<span>"+fmtDate(ev.date_start,ev.date_end)+"</span></div>";
  h+="<div class='ev-row'>"+SVG_PIN+"<span>"+esc(ev.location_name||ev.address||"\u2014")+"</span></div>";
  if(ev.time_start)h+="<div class='ev-row'>"+SVG_CLK+"<span>"+esc(ev.time_start)+"</span></div>";
  h+="<div class='ev-row'>"+SVG_TKT+"<span>"+esc(price)+"</span></div>";
  if(ev.description)h+="<div class='ev-desc'>"+esc(ev.description)+"</div>";
  h+="</div>";
  document.getElementById("event-content").innerHTML=h;
  showScreen("event");
}

loadEvents();
</script>
