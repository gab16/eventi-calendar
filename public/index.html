<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eventi — Community Event Calendar | TattiOnline</title>
<meta name="description" content="Discover local events. Browse the calendar, filter by category, find things to do.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{background:#FAF7F2;color:#2D2A26;font-family:'Nunito',sans-serif}
#root{min-height:100vh;display:flex;flex-direction:column}
.fi{animation:fi .35s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#D4CFC7;border-radius:3px}
@media(max-width:768px){
  html{font-size:14px}
  .cal-layout{flex-direction:column !important}
  .cal-grid-wrap{min-width:0 !important}
  .side-panel{flex:1 !important;max-height:none !important;min-width:0 !important}
  .filter-chips{gap:4px !important}
  .chip-btn{padding:4px 10px !important;font-size:11px !important}
  .cell-evt{font-size:10px !important}
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

<script type="text/babel">
const { useState, useMemo, useEffect, useCallback } = React;

const API_URL = '/api/events';
const PRICE_FILTERS = ["All","Free","Paid"];
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const MONTHS_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

const CAT_STYLE = {
  Music:{bg:"#FDE8F0",fg:"#C2185B",icon:"🎵"},
  Food:{bg:"#FFF3E0",fg:"#E65100",icon:"🍽"},
  Art:{bg:"#E8EAF6",fg:"#283593",icon:"🎨"},
  Sport:{bg:"#E8F5E9",fg:"#2E7D32",icon:"⚽"},
  Community:{bg:"#F3E5F5",fg:"#6A1B9A",icon:"🤝"},
  Workshop:{bg:"#E0F7FA",fg:"#00695C",icon:"🔧"},
  Market:{bg:"#FFF8E1",fg:"#F57F17",icon:"🛍"},
  Wellness:{bg:"#E8F5E9",fg:"#1B5E20",icon:"🧘"},
  Culture:{bg:"#EDE7F6",fg:"#4527A0",icon:"📚"},
  Theatre:{bg:"#FCE4EC",fg:"#880E4F",icon:"🎭"},
  Cinema:{bg:"#EFEBE9",fg:"#4E342E",icon:"🎬"},
  Festival:{bg:"#FFF3E0",fg:"#BF360C",icon:"🎪"},
  "Presentazione libro":{bg:"#E8EAF6",fg:"#1A237E",icon:"📖"},
};
const DEF_CAT = {bg:"#F5F5F5",fg:"#616161",icon:"📌"};
function gc(c){return CAT_STYLE[c]||DEF_CAT}
function isFree(p){return !p||p.toLowerCase().includes('free')||p==='0'||p==='€0'||p.toLowerCase().includes('gratis')||p.toLowerCase().includes('gratuito')}
function dim(y,m){return new Date(y,m+1,0).getDate()}
function fdow(y,m){const d=new Date(y,m,1).getDay();return d===0?6:d-1}
function fmt(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function ds(s){return (s||'').slice(0,10)}

function App(){
  const now=new Date();
  const [events,setEvents]=useState([]);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [month,setMonth]=useState(now.getMonth());
  const [year,setYear]=useState(now.getFullYear());
  const [selDate,setSelDate]=useState(null);
  const [selEvent,setSelEvent]=useState(null);
  const [catF,setCatF]=useState("All");
  const [priceF,setPriceF]=useState("All");
  const [search,setSearch]=useState("");
  const [view,setView]=useState("cal");

  const fetchEvents=useCallback(async()=>{
    setLoading(true);setError(null);
    try{
      const r=await fetch(API_URL);
      if(!r.ok)throw new Error(`Error ${r.status}`);
      const d=await r.json();
      if(d.error)throw new Error(d.error);
      setEvents(d.events||[]);
    }catch(e){
      setError(e.message);
      setEvents([
        {id:"s1",event_name:"Jazz al Tramonto",date_start:"2026-05-18",time_start:"21:00",location_name:"Blue Note Milano",category:"Music",price:"€25",description:"Live jazz quartet.",is_sponsored:false},
        {id:"s2",event_name:"Street Food Festival",date_start:"2026-05-20",date_end:"2026-05-22",time_start:"11:00",location_name:"Darsena",category:"Food",price:"Free",description:"International street food.",is_sponsored:true},
        {id:"s3",event_name:"Yoga al Parco",date_start:"2026-05-24",time_start:"08:00",location_name:"Parco Sempione",category:"Sport",price:"Free",is_sponsored:false},
      ]);
    }
    setLoading(false);
  },[]);

  useEffect(()=>{fetchEvents()},[fetchEvents]);

  const categories=useMemo(()=>{
    const c=new Set(events.map(e=>e.category).filter(Boolean));
    return["All",...Array.from(c).sort()];
  },[events]);

  const filtered=useMemo(()=>{
    return events.filter(e=>{
      if(catF!=="All"&&e.category!==catF)return false;
      if(priceF==="Free"&&!isFree(e.price))return false;
      if(priceF==="Paid"&&isFree(e.price))return false;
      if(search){const s=search.toLowerCase();if(!e.event_name.toLowerCase().includes(s)&&!(e.location_name||'').toLowerCase().includes(s)&&!(e.organizer||'').toLowerCase().includes(s))return false}
      return true;
    });
  },[events,catF,priceF,search]);

  const monthEvts=useMemo(()=>{
    return filtered.filter(e=>{
      const s=new Date(ds(e.date_start)+'T12:00:00');
      const end=e.date_end?new Date(ds(e.date_end)+'T12:00:00'):s;
      return s<=new Date(year,month+1,0,23,59)&&end>=new Date(year,month,1);
    }).sort((a,b)=>a.date_start.localeCompare(b.date_start));
  },[filtered,year,month]);

  function onDate(d){return filtered.filter(e=>{const s=ds(e.date_start),end=ds(e.date_end)||s;return s<=d&&d<=end})}

  const nDays=dim(year,month),fd=fdow(year,month);
  const cells=[];
  for(let i=0;i<fd;i++)cells.push(null);
  for(let d=1;d<=nDays;d++)cells.push(d);
  while(cells.length%7)cells.push(null);

  const todayStr=fmt(now.getFullYear(),now.getMonth(),now.getDate());

  function prev(){if(month===0){setMonth(11);setYear(y=>y-1)}else setMonth(m=>m-1);setSelDate(null);setSelEvent(null)}
  function next(){if(month===11){setMonth(0);setYear(y=>y+1)}else setMonth(m=>m+1);setSelDate(null);setSelEvent(null)}

  return(
  <div style={S.root}>
    {/* HEADER */}
    <header style={S.hdr}>
      <div style={S.hdrTop}>
        <div>
          <h1 style={S.logo}>📅 <span style={S.logoTxt}>Eventi</span></h1>
          <p style={S.tag}>Community Event Calendar</p>
        </div>
        <div style={S.hdrAct}>
          <button style={{...S.vBtn,...(view==="cal"?S.vBtnA:{})}} onClick={()=>setView("cal")}>📅 Calendar</button>
          <button style={{...S.vBtn,...(view==="list"?S.vBtnA:{})}} onClick={()=>setView("list")}>📋 List</button>
          <button style={S.tBtn} onClick={()=>{setMonth(now.getMonth());setYear(now.getFullYear());setSelDate(todayStr);setSelEvent(null)}}>Today</button>
        </div>
      </div>
      <div style={S.fRow}>
        <div style={S.sWrap}><span style={S.sIco}>🔍</span><input style={S.sIn} placeholder="Search events, venues…" value={search} onChange={e=>setSearch(e.target.value)}/></div>
        <div className="filter-chips" style={S.chips}>
          {categories.map(c=>{const cs=gc(c);const a=catF===c;return <button key={c} className="chip-btn" onClick={()=>setCatF(c)} style={{...S.chip,...(a?{background:c==="All"?"#2D2A26":cs.fg,color:"#fff",borderColor:"transparent"}:{})}}>{c!=="All"&&cs.icon?cs.icon+" ":""}{c}</button>})}
          <span style={S.cdiv}>·</span>
          {PRICE_FILTERS.map(p=><button key={p} className="chip-btn" onClick={()=>setPriceF(p)} style={{...S.chip,...(priceF===p?{background:"#2D2A26",color:"#fff",borderColor:"transparent"}:{})}}>{p==="Free"?"🆓 Free":p==="Paid"?"💶 Paid":p}</button>)}
        </div>
      </div>
    </header>

    {loading&&<div style={S.stat}>⏳ Loading events…</div>}
    {error&&<div style={{...S.stat,background:"#FFF3E0",color:"#E65100"}}>⚠️ Using sample data</div>}

    {/* CALENDAR */}
    {view==="cal"&&<div style={S.mainA}>
      <div style={S.mNav}><button style={S.arr} onClick={prev}>‹</button><h2 style={S.mLbl}>{MONTHS[month]} <span style={S.yLbl}>{year}</span></h2><button style={S.arr} onClick={next}>›</button></div>
      <div className="cal-layout" style={S.calL}>
        <div className="cal-grid-wrap" style={S.calGW}>
          <div style={S.calG}>
            {DAYS.map(d=><div key={d} style={S.dH}>{d}</div>)}
            {cells.map((day,i)=>{
              if(!day)return <div key={'e'+i} style={S.eC}/>;
              const d=fmt(year,month,day),de=onDate(d),isT=d===todayStr,isS=d===selDate,isW=((fd+day-1)%7)>=5;
              return(
                <div key={day} style={{...S.cl,...(isW?S.clW:{}),...(isT?S.clT:{}),...(isS?S.clS:{})}} onClick={()=>{setSelDate(d);setSelEvent(null)}}>
                  <div style={S.clH}><span style={{...S.clN,...(isT?S.clNT:{})}}>{day}</span>{isT&&<span style={S.tBdg}>today</span>}</div>
                  <div style={S.clEv}>
                    {de.slice(0,3).map((ev,j)=>{const cs=gc(ev.category);return(
                      <div key={ev.id+'_'+j} className="cell-evt" style={{...S.cEv,background:cs.bg,color:cs.fg,borderLeft:'3px solid '+cs.fg}} onClick={e=>{e.stopPropagation();setSelDate(d);setSelEvent(ev)}} title={ev.event_name}>
                        <span style={S.cEvT}>{ev.event_name}</span>
                      </div>
                    )})}
                    {de.length>3&&<div style={S.cMore}>+{de.length-3} more</div>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
        <div className="side-panel" style={S.sP}>
          {selEvent?<Detail ev={selEvent} onBack={()=>setSelEvent(null)}/>
          :selDate?<div className="fi"><h3 style={S.sT}>{new Date(selDate+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</h3>{onDate(selDate).length===0?<div style={S.emSt}><span style={{fontSize:40}}>📭</span><p>No events on this day</p></div>:onDate(selDate).map(ev=><Card key={ev.id} ev={ev} onClick={()=>setSelEvent(ev)}/>)}</div>
          :<div className="fi"><h3 style={S.sT}>📋 Upcoming in {MONTHS[month]}</h3>{monthEvts.length===0?<div style={S.emSt}><span style={{fontSize:40}}>🗓</span><p>No events this month</p></div>:monthEvts.map(ev=><Card key={ev.id} ev={ev} onClick={()=>{setSelEvent(ev);setSelDate(ds(ev.date_start))}}/>)}</div>}
        </div>
      </div>
    </div>}

    {/* LIST */}
    {view==="list"&&<div style={S.listA}>
      <div style={S.mNav}><button style={S.arr} onClick={prev}>‹</button><h2 style={S.mLbl}>{MONTHS[month]} <span style={S.yLbl}>{year}</span></h2><button style={S.arr} onClick={next}>›</button></div>
      {monthEvts.length===0?<div style={S.emSt}><span style={{fontSize:48}}>🗓</span><p style={{fontSize:16}}>No events match your filters</p></div>
      :monthEvts.map(ev=><Card key={ev.id} ev={ev} wide onClick={()=>setSelEvent(ev)}/>)}
      {selEvent&&<div style={S.ovl} onClick={()=>setSelEvent(null)}><div style={S.mdl} onClick={e=>e.stopPropagation()}><Detail ev={selEvent} onBack={()=>setSelEvent(null)}/></div></div>}
    </div>}

    <footer style={S.ft}><span>tattionline.com</span><span>{events.length} events</span></footer>
  </div>);
}

function Card({ev,onClick,wide}){
  const cs=gc(ev.category);const d=new Date(ds(ev.date_start)+'T12:00:00');
  const hasEnd=ev.date_end&&ds(ev.date_end)!==ds(ev.date_start);
  return(
    <div style={{...S.card,...(wide?{maxWidth:'100%'}:{})}} onClick={onClick} className="fi">
      <div style={{...S.cardAc,background:cs.fg}}/>
      <div style={S.cardC}>
        <div style={S.cardTop}>
          <div style={{...S.catBdg,background:cs.bg,color:cs.fg}}>{cs.icon} {ev.category}</div>
          {ev.is_sponsored&&<span style={S.spBdg}>⭐ Sponsored</span>}
          {isFree(ev.price)&&<span style={S.frBdg}>Free</span>}
        </div>
        <h4 style={S.cardNm}>{ev.event_name}</h4>
        <div style={S.cardDt}>
          <span style={S.cdl}>📅 {d.getDate()} {MONTHS_SHORT[d.getMonth()]}{hasEnd?' → '+ds(ev.date_end):''}</span>
          {ev.time_start&&ev.time_start!=='00:00'&&<span style={S.cdl}>🕐 {ev.time_start}</span>}
          {ev.location_name&&<span style={S.cdl}>📍 {ev.location_name}</span>}
        </div>
        {!isFree(ev.price)&&ev.price&&<div style={S.cardPr}>💶 {ev.price}</div>}
      </div>
    </div>
  );
}

function Detail({ev,onBack}){
  const cs=gc(ev.category);const d=new Date(ds(ev.date_start)+'T12:00:00');
  return(
    <div className="fi" style={{animation:'slideIn .3s ease'}}>
      <button style={S.bk} onClick={onBack}>← Back</button>
      <div style={{...S.dHero,background:`linear-gradient(135deg,${cs.bg},#fff)`}}>
        <span style={{fontSize:48}}>{cs.icon}</span>
        <div style={{...S.dCatB,background:cs.fg,color:'#fff'}}>{ev.category}</div>
        <h2 style={S.dTtl}>{ev.event_name}</h2>
        {ev.is_sponsored&&<span style={S.spBdg}>⭐ Sponsored</span>}
      </div>
      <div style={S.dInfo}>
        <IR i="📅" l="Date" v={d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})+(ev.date_end&&ds(ev.date_end)!==ds(ev.date_start)?' → '+ds(ev.date_end):'')}/>
        {ev.time_start&&ev.time_start!=='00:00'&&<IR i="🕐" l="Time" v={ev.time_start}/>}
        {ev.location_name&&<IR i="📍" l="Venue" v={ev.location_name}/>}
        {ev.address&&<IR i="🗺️" l="Address" v={ev.address}/>}
        {ev.organizer&&<IR i="👤" l="Organizer" v={ev.organizer}/>}
        <IR i="💶" l="Price" v={isFree(ev.price)?'Free!':ev.price}/>
        {ev.language&&<IR i="🌐" l="Language" v={ev.language}/>}
        {ev.phone&&<IR i="📞" l="Phone" v={ev.phone}/>}
      </div>
      {ev.description&&<div style={S.dDesc}><p style={S.dDTxt}>{ev.description}</p></div>}
    </div>
  );
}
function IR({i,l,v}){return <div style={S.ir}><span style={S.irI}>{i}</span><span style={S.irL}>{l}</span><span style={S.irV}>{v}</span></div>}

const S={
  root:{fontFamily:"'Nunito',sans-serif",background:"#FAF7F2",color:"#2D2A26",minHeight:"100vh",display:"flex",flexDirection:"column"},
  hdr:{background:"#fff",borderBottom:"1px solid #E8E4DD",padding:"16px 24px 12px",position:"sticky",top:0,zIndex:100,boxShadow:"0 1px 8px rgba(0,0,0,.04)"},
  hdrTop:{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12,marginBottom:12},
  logo:{fontSize:28,margin:0,display:"flex",alignItems:"center",gap:8},
  logoTxt:{fontFamily:"'Playfair Display',serif",fontWeight:700,color:"#2D2A26"},
  tag:{fontSize:11,color:"#8C8578",letterSpacing:1.5,textTransform:"uppercase",marginTop:2},
  hdrAct:{display:"flex",gap:6},
  vBtn:{background:"#F5F1EC",border:"1px solid #E8E4DD",color:"#6B6560",padding:"8px 16px",borderRadius:20,cursor:"pointer",fontSize:13,fontFamily:"'Nunito',sans-serif",fontWeight:600,transition:"all .15s"},
  vBtnA:{background:"#2D2A26",color:"#fff",borderColor:"#2D2A26"},
  tBtn:{background:"#E8F5E9",border:"1px solid #A5D6A7",color:"#2E7D32",padding:"8px 16px",borderRadius:20,cursor:"pointer",fontSize:13,fontFamily:"'Nunito',sans-serif",fontWeight:700},
  fRow:{},
  sWrap:{position:"relative",maxWidth:400,marginBottom:10},
  sIco:{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:14,pointerEvents:"none"},
  sIn:{width:"100%",padding:"10px 14px 10px 36px",borderRadius:12,border:"1px solid #E8E4DD",background:"#FAF7F2",color:"#2D2A26",fontSize:14,fontFamily:"'Nunito',sans-serif",outline:"none"},
  chips:{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"},
  chip:{background:"#F5F1EC",border:"1px solid #E8E4DD",color:"#6B6560",padding:"5px 14px",borderRadius:20,cursor:"pointer",fontSize:12,fontFamily:"'Nunito',sans-serif",fontWeight:600,transition:"all .15s",whiteSpace:"nowrap"},
  cdiv:{color:"#D4CFC7",margin:"0 2px",fontSize:18},
  stat:{padding:"8px 24px",fontSize:13,fontWeight:600,background:"#E3F2FD",color:"#1565C0",textAlign:"center"},
  mainA:{flex:1,padding:"0 24px 24px"},
  mNav:{display:"flex",alignItems:"center",justifyContent:"center",gap:20,padding:"16px 0"},
  arr:{background:"#fff",border:"1px solid #E8E4DD",color:"#6B6560",width:40,height:40,borderRadius:"50%",cursor:"pointer",fontSize:22,fontFamily:"'Nunito',sans-serif",fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 1px 3px rgba(0,0,0,.06)"},
  mLbl:{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:700,color:"#2D2A26",margin:0},
  yLbl:{fontWeight:600,color:"#8C8578"},
  calL:{display:"flex",gap:24,alignItems:"flex-start",flexWrap:"wrap"},
  calGW:{flex:"1 1 500px",minWidth:0},
  calG:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,background:"#E8E4DD",border:"1px solid #E8E4DD",borderRadius:16,overflow:"hidden"},
  dH:{background:"#2D2A26",color:"#fff",textAlign:"center",fontSize:12,fontWeight:700,padding:"10px 0",textTransform:"uppercase",letterSpacing:.5},
  eC:{background:"#F5F1EC",minHeight:90,padding:6},
  cl:{background:"#fff",minHeight:90,padding:6,cursor:"pointer",transition:"background .12s",position:"relative"},
  clW:{background:"#FDFBF8"},
  clT:{background:"#FFFDE7",boxShadow:"inset 0 0 0 2px #FBC02D"},
  clS:{background:"#E3F2FD",boxShadow:"inset 0 0 0 2px #1976D2"},
  clH:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3},
  clN:{fontSize:14,fontWeight:700,color:"#6B6560"},
  clNT:{color:"#F57F17",fontSize:16},
  tBdg:{fontSize:9,background:"#FBC02D",color:"#fff",padding:"1px 6px",borderRadius:8,fontWeight:700,textTransform:"uppercase"},
  clEv:{display:"flex",flexDirection:"column",gap:2},
  cEv:{padding:"2px 5px",borderRadius:4,fontSize:11,fontWeight:600,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",cursor:"pointer"},
  cEvT:{overflow:"hidden",textOverflow:"ellipsis"},
  cMore:{fontSize:10,color:"#8C8578",fontWeight:600,paddingLeft:4},
  sP:{flex:"0 0 340px",minWidth:280,maxHeight:600,overflowY:"auto",background:"#fff",borderRadius:16,border:"1px solid #E8E4DD",padding:20,boxShadow:"0 2px 12px rgba(0,0,0,.04)"},
  sT:{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,color:"#2D2A26",margin:"0 0 16px",lineHeight:1.3},
  emSt:{textAlign:"center",padding:"32px 16px",color:"#8C8578"},
  card:{background:"#fff",borderRadius:14,overflow:"hidden",marginBottom:10,cursor:"pointer",display:"flex",border:"1px solid #E8E4DD",transition:"box-shadow .15s",boxShadow:"0 1px 4px rgba(0,0,0,.04)"},
  cardAc:{width:5,flexShrink:0},
  cardC:{padding:"12px 14px",flex:1,minWidth:0},
  cardTop:{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",marginBottom:6},
  catBdg:{fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:12,textTransform:"uppercase",letterSpacing:.3,whiteSpace:"nowrap"},
  spBdg:{fontSize:10,fontWeight:700,color:"#F57F17",letterSpacing:.3},
  frBdg:{fontSize:10,fontWeight:700,color:"#2E7D32",background:"#E8F5E9",padding:"2px 8px",borderRadius:10},
  cardNm:{fontSize:15,fontWeight:700,color:"#2D2A26",margin:"0 0 6px",lineHeight:1.3},
  cardDt:{display:"flex",flexDirection:"column",gap:2},
  cdl:{fontSize:12,color:"#6B6560"},
  cardPr:{fontSize:12,color:"#BF360C",fontWeight:600,marginTop:4},
  bk:{background:"none",border:"none",color:"#1976D2",cursor:"pointer",fontSize:13,fontWeight:700,padding:"0 0 12px",fontFamily:"'Nunito',sans-serif"},
  dHero:{borderRadius:14,padding:"24px 20px",marginBottom:16},
  dCatB:{display:"inline-block",fontSize:12,fontWeight:700,padding:"4px 14px",borderRadius:20,marginTop:10,textTransform:"uppercase",letterSpacing:.5},
  dTtl:{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,color:"#2D2A26",marginTop:10,lineHeight:1.3},
